body:
  text: 唐通玄先生張果注元混然子王道淵注明復初道人高時明訂正混然子曰夫陰符者一陰一陽之謂也太極未判之始溟溟涬涬寥廓無光純一陰炁而已陰因之極一陽生於中便分奇偶陽動陰靜兩儀判焉人生其中三才立焉三才旣立萬物生焉生萬物者道也成至道者人也聖人所以建天地施德化修性命定人物此陰符所以作也以世法言萬物皆有形曰陰萬物皆有性命曰符萬物皆有自然之道曰經以道用言人之四大一身皆屬陰惟一點祖炁居天心屬陽是曰命蒂性與命合曰符符者契合也分開兩箇勘合渾淪陰符二字身心也性情也水火也神氣也鉛汞也龍虎也動靜也乃爲修丹之根本養道之淵宗凡作丹妙用每遇日中冬至之時則當閉關外則運陽火於東南而復退陰符於西北存北方不行正萬物藏形之時也於此時含光内燭眞氣薰蒸片餉之間混融磅礴陰氣消化陽氣日新此立成丹基之胎久久純熟自然精氣輕淸如熱雲旋轉華池津液脈絡之來澆灌靈根結成還丹是謂陰符之道也經之爲言徑也人人共行之徑路也丹經云處處綠楊堪繫馬家家有路到長安頌曰太極未分渾是陰一陽動處見天心陽舒陰慘相符合大道生生德化深觀天之道執天之行盡矣通玄先生曰觀自然之道無所觀也不觀之以目而觀之以心心深微而無所見故能照自然之性惟深微而能照其斯之謂陰執自然之行無所執也不執之以手而執之以機機變通而無所繫故能契自然之理惟變通而能契其斯之謂符照之以心契之以機而陰符之義盡矣混然子曰觀者仰觀於天也仰見其天道日月運行風雲變化鼓之以雷霆潤之以雨澤一暑一寒一來一往此天道運化以行鬼神所以生物之大功也至如在天星象北辰居其天中寂然不動而眾星拱之隨斗標晝夜旋轉周天此天向一中分造化也北斗屬水水得六數何以有七星南斗屬火火得七數何以有六星此水火互交自然之道也是以聖人見天道如此返求於身觀之我身卽天地故執天以行之也人之一呼一吸卽乾坤闔闢也水上升火下降卽日月運行也鼓吾身之槖籥卽風雲變化也吸神觀心鍊精化氣逆上泥丸卽鼓之以雷霆也浩氣冲虛神水流注卽潤之以雨澤也進陽火退陰符卽一暑一寒一來一往也此執大化運行於身無不與天道同也密戸之左生門之右中虛一竅空玄不動萬神朝會之宗卽北辰居其所而眾星拱之也天一生水從地而生地二生火從天而降水中藏火火中藏水卽北斗屬水而七星南斗屬火而六星丹家所謂龍從火裏出虎向水中生是也學人能知此數說不可著在文字上猜度要明未畫以前造化此箇微意當求眞師口訣而後可知夫修丹之道一要明鼎器端的二要攢簇藥物眞全三要運符火烹鍊得法戒定性智絶利淸源行住坐臥綿綿若存如此勤而修之未有不成道者也老子曰谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤丹經云一馬自隨天變化六龍長駕日循環張紫陽云先把乾坤爲鼎器次摶烏兎藥來烹邵子故曰天人焉有兩般義道不虛行只在人豈不是觀天之道執天之行盡矣哉頌曰觀天之道運無窮故執樞機合聖功顚倒這些消息子乾坤都入黍珠中天有五賊見之者昌五賊在心施行於天通玄先生曰五賊者命物時功神也傳曰聖人之理圖大而不顧其細體瑜而不掩其瑕故居夷則導道布德以化之履險則用權發機以拯之務在匡天地謀在濟人倫於是用大義除天下之害用大仁興天下之利用至正錯天下之枉用至公平天下之私故反經合道之謀其名有五聖人禪之乃謂之賊天下賴之則謂之德故賊天之命人知其天而不知其賊黃帝所以代炎帝也賊天之物人知其天而不知其賊帝堯所以代帝摯也賊天之時人知其天而不知其賊帝舜所以代帝堯也賊天之功人知其天而不知其賊大禹所以代帝舜也賊天之神人知其天而不知其賊殷湯所以革夏命也故見之者昌自然而昌也又曰其立德明機用妙發之於内見之於外而已豈稱兵革以作寇亂哉混然子曰五賊者乃五行之氣也在天地爲水火木金土在人爲心肝脾肺腎又爲精神魂魄意又爲眼耳鼻舌身人之一點元靈父母未生巳前甚是分明始因父母生我之形此靈入竅被形所梏人爲赤子之時性無不善蓋因年漸長成習染各異眼耳鼻舌被色聲香味所觸而心貪愛意馬馳騁於是流浪苦海愛河迷亂眞性耗其靈根失其至寶此所以被五賊所害世人不得眞道者爲此也尹眞人曰天物怒流人事錯錯然正謂此也學人若能勘破浮華幻相皆非我有惟一靈眞性是我本來面目從今去不被幻軀所役把已往貪愛之心盡底掀翻但虛其心實其腹弱其志强其骨動靜之間以性爲主人以五賊爲家臣君無爲而正信於内臣有爲而營運於外内外合心君臣混一自然三花聚頂五氣朝元異骨成親欣樂太平金剛經云凡所有相卽是虛妄若見諸相非相卽見如來豈不是天有五賊而見之者昌歟了眞子曰酒是良朋伴是花嶺頭時駕紫河車可憐金虎一聲嘯吹散靑天五彩霞豈不是五賊在心施行於天者乎學人宜於此詳味頌曰五行之氣結成形卻生前一點靈五賊若能歸主宰施天自有道光明宇宙在乎手萬化生乎身通玄先生曰見其機而執之雖宇宙之大不離乎掌領况其小者乎知其神而體之雖萬物之眾不能出其胸臆况其寡者乎自然造化之功而我有之不亦盛乎不亦大乎混然子曰以道用言有道之人一心能制五賊遇五賊攻心我則把定三關天機不動外施金母之功簇三千六百之正氣回七十二候之要津行道一息能奪一年之節候是以升陽施化出古超今皆在吾掌握之中矣古人所謂我命在我不在於天天地小我我大天地皇天不遠大藥非遙誠哉言也若得眞傳口訣運行符火於一身如取囊中物爾靜則爲金丹動則爲霹𩆝以世法言一君正位萬臣咸歸則天地山河人民賦貢莫不皆奉其主所有衣冠禮樂刑法制度莫不皆由君出道用與世法卽同一體且如天下淸平人民樂化雖有甲兵無所陳之用文而偃其武也忽遇㓂賊生發便當建侯行師而討平之用武而後其文也鼎器歌故曰首尾武中間文老子曰吾何以知天下之然哉以此豈不是宇宙在乎手萬化生乎身哉頌曰有道之人固本源經天緯地量玄玄一拳握定陰陽領運化風威徧大千天性人也人心機也立天之道以定人也通玄先生曰傳曰人謂天性機謂人心人性本自玄合故聖人能體五賊也混然子曰天賦命於人謂之性人心發用謂之機性卽天也心卽性也是以聖人觀天之道明天之性執天之行運心之機夫立天之道者一陰一陽也定人之道者一仁一義也以世法言天生於人惟人得其全體道必假人以行之天性妙理無非在於人心心所以能包含天理一動一靜分明發露天之機也聖人大觀天下以謂人人同體箇箇同眞於是制言行施教化立天道定人倫布告天下使人人知其有君臣父子夫婦長幼朋友三綱五常之理率性修道盡敬其身中庸云天命之謂性率性之謂道修道之謂教是也以道用言天性常主於靜人心常欲於動靜則養性動則復命復命曰常返常合道是立天之道以定人也老子曰故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄眾妙之門孔子云一日克已復禮天下歸仁焉如斯之謂也頌曰天性人心理一同機關動靜道相通乾坤上下君臣合萬國民安樂𡻕豐天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆天人合發萬化定機通玄先生曰傳曰天機張而不生天機弛而不死天有弛張用有否臧張則殺威行弛則殺威亡天殺之機息然天以氣爲威人以德爲機秋冬陰氣嚴凝天之張殺機也故龍蛇畏而蟄伏冬謝春來陰退陽長天之弛殺機也故龍蛇悅而振起天亦有寒暄德亦有寒暄人亦有寒暄德刑總肅君之張殺機也故臣下畏而服從德失刑偏君之弛殺機也故姦雄悅而馳騁位有尊卑如人有天地故曰天發殺機龍蛇起陸寇亂所由作人發殺機天地反覆尊卑由是革又曰天以禍福之機運於上君以利害之機動於下故有德者萬變而愈盛以至於王無德者萬化而愈衰以至於亡萬變定基自然而定混然子曰形而上者謂之天形而下者謂之地鍾秀而生謂之人天地人三才而各有機天以斗爲機地以雷爲機人以心爲機也天發殺機移星易㝛者此謂乾坤運化斗柄推遷晝夜不停其機諸星㝛隨其旋轉此陰陽造化自然之理也夫周天三百六十五度四分度之一諸星㝛皆有行其度次至如行此一度巳滿必移過別宮度而行之餘度亦然是以滿而必至於反反而必復於初此氣數反常合道之理也地發殺機龍蛇起陸者此言地道厚載龍蛇蟄藏時因陰極而陽生於下陽漸長而壯雷動發聲從地而起龍蛇聞雷之聲乘陽而起此所以地發殺機龍蛇起於陸也人發殺機天地反覆者此謂覆卽復也三才之中惟人最靈是以聖人觀天之道執天之行審地之理法地之用夫惟用是用返本還元以復之效天地之道以修其眞也天之星㝛卽我身之斗柄也地之龍蛇卽我身之水火也凡作丹之用不過斡天罡而旋轉斗柄顚倒陰陽而旣濟水火當鉛見癸生之時便以神呼氣歸鼎握固天罡以旋斗標此發天機移星易㝛也流戊土而化火逼逐金精逆上泥丸此發地機龍蛇起陸也乾坤交媾之罷一氣流通直入黃庭而止產箇驪珠似月之圓發眞火煅鍊結成金丹此人發殺機天地反覆也張紫陽所謂取將坎位中心實點化離宮腹裏陰從此變成乾健體潛藏飛躍總由心丹經云人心若與天心合顚倒陰陽只片時道德經云致虛極守靜篤萬物並作吾以觀其復譚景升化書所言得天地之綱知陰陽之房見精神之藏則數可以奪命可以活天地可以反復正謂此也天人合發萬化定基者天乃指性而言也人乃指命而言也總而言之作丹有時時至神知當此時採取則藥物應機施功一息之頃能定萬化之基只用半箇時辰而得還丹度人經乃曰璇璣玉衡一時停輪河海靜默山嶽藏雲天無浮翳四氣朗淸土皆作碧玉無有異色豈非天人合發而萬化定基者乎頌曰旋斗厯箕回五常龍蛇起陸會乾陽半時反復施刑德萬化都歸一粟藏性有巧拙可以伏藏九竅之邪在乎三要可以動靜通玄先生曰傳曰聖人之性巧於用居窮行險則謀道以濟之對强與明則行義以退避之理國必以是行師亦以是又曰九竅之用三要爲機三要者機情性也機之則無不安情之則無不邪性之則無不正故聖人動以伏其情靜以常其性樂以定其機小人則反此故下文云君子得之固躬小人得之輕命混然子曰人之一點眞靈謂之性百事通曉謂之巧諸般不能謂之拙所以巧者多智拙者多愚此二者過猶不及皆不得其中庸之道正孔子所謂智者過之愚者不及蓋爲人生於天地之間風土不同稟受自異故氣質有差耳是以性有巧有拙聖人故於此示人得其巧者不可逞於巧得其拙者不可縱於貪巧與拙可以伏藏於心自然復於本性而不妄矣苟有不藏於心巧者弄於巧拙者妄於貪如是之人未有不陷於害者也老子曰人多伎巧奇物滋起法令滋彰盜賊多有故聖人絶聖棄智絶巧棄利大巧若拙大辯若訥豈不是伏藏者也九竅之邪在乎三要可以動靜者此言九竅人之首有九宮乃曰九竅本來天性於泥丸所居故曰性門又曰髓海髓海滿而精神全暢髓海消而精神耗竭首之九宮其名不一今略言之泥丸之宮爲百關總會之穴乃萬神朝集之宮諸星森羅日月運轉無非於此處撥動機關而旋斗柄此人法天地合象如此凡人性於日用之間下連於心心有七孔二毛亦曰九竅以應上天北斗七星左輔右弻此乃有象之心若言天心在人身天地正中混洞空玄實無形象聖父聖母所付一點眞陽之炁居此天心是爲元始祖劫性君寄體於此陽得九數故乾元用九是爲九竅合之爲一散之則九所以人心一念動處北辰卽知是故聖人於此經中垂戒學人平日二六時中可以虛心靜性保氣惜精凡遇邪攻九竅便當連三要以復之夫惟三要有内三要有外三要内之三要者精氣神也外三要者眼耳口也眼爲神之門耳爲精之門口爲氣之門視之不息則神從眼漏聽之不息則精從耳漏言之不息則氣從口漏逐於外而失於内心爲形役是九竅之邪在乎三要者也若能收其視返其聽緘其言當施功發越之際牢閉三關飛意存神於兩腎中根鍊精化氣上補泥丸以腦腦補完而金液生鍊氣下化於神神復全而眞火旺發神火以鍊虛虛室受陽而生白結成靈胎神明開慧此鍊還丹眞功夫也須用口傳心授大要識時通變當靜以養性當動以修命性命雙修吾道長存豈非可以動靜者耶參同契曰耳目口三寶固塞勿發揚眞人潛深淵浮游守規中卽經中所謂三返晝夜用師萬倍是也頌曰巧拙都忘遠客塵回光返聽內全神三般大藥燒成寶占斷陽臺一段春火生於木禍發必尅姦生於國時動必潰知之修鍊謂之聖人通玄先生曰傳曰夫木性靜動而生火不覺火盛而焚其質猶人之情靜動而生姦不覺姦成而亂其國夫明者見彼之隟以設其機智者知彼之病以圖其利則天下之人彼愚而我聖混然子曰火之爲言忿也姦之爲言慾也所謂火生於木禍發必尅者以俗人言之凡因事觸心卽生忿火性上炎神怒氣發與人鬬爭卻不知離中之神被無明火盡焚之矣姦生於國其動必潰者此言國猶身也身隨幻變眼因色媚神領在心情慾交蔽陽卽下奔動之必潰卻不知坎內眞精被姦盡潰之矣如是之人直至死而後已豈知修鍊者哉是以聖人明天地陰陽符候之理反求於身行之木旺則火生金旺則水生卯酉二八之月宜當沐浴凡遇火生於木則當存性而懲忿也故禍發而必尅當姦生於國我則閉門而窒慾也流意回坤故動之而必潰眞人故曰惟其來干者皆攝之以一息則變物爲我易卦云復其見天地之心乎所以知之修鍊是謂聖人也已頌曰野戰防危要識時龍爭虎鬬兩奔馳片時風掃浮雲盡露出蟾光一片輝天生天殺道之理也通玄先生曰是謂生者自謂得其生死者自謂得其死無不謂得道之理也混然子曰以世法言天生陽也天殺陰也一陰一陽之謂道一生一殺之謂理天生於春萬物發生於陽天之仁也天殺於秋萬物收歛於陰天之義也陰陽消長道之理也是以聖人觀天之道執理於心以無爲而化天下之民聖人之仁也以五刑而齊天下之法聖人之義也仁義體用聖人之道也以道用言凡遇身中冬至之時則當閉關靜定飛意化火鍊精爲氣督進陽火從太玄宮提上南宮此天生之理也至此已往陽極而虧故一陰生於五陽之下則當歛陽而退陰符從玉山上京下重樓送至坤位而止發武火煅鍊烹陰爲陽此天殺之理也運用一身緜緜若存豈不是道之理也邵子曰乾遇巽時觀月窟地逢雷處看天根天根月窟閑來往三十六宮都是春如斯之謂也頌曰陽龍陰虎兩盤旋生殺天機理自然鍊出一丸眞種子壺中春滿道緜緜天地萬物之盜萬物人之盜人萬物之盜通玄先生曰傳曰天地以陰陽之氣化萬物萬物不知其盜萬物以美惡之味饗人人不知其盜人以利害之謀制萬物萬物不知其盜混然子曰天地萬物之盜者此謂天地生萬物萬物之性命莫不由乎陰陽運化結成其形舉心動念處天地皆知作其善者鬼神護佑作其惡者雷霆典刑此天地所以盜萬物也萬物人之盜者此言萬物之生與人並作人身之內生八萬四千蟲今略言之內則五臟被蟯蛔所食外則皮膚被蚤蝨所攻譚景升化書所謂𧕍虰者腹中之蟲也摶我精氣鑠我魂魄盜我滋味而有其生此萬物所以盜人也人萬物之盜者此言人爲萬物之靈一心包含萬物之理師天地而知運化師蜘蛛而結網罟師蜜蜂而立君臣師拱鼠而製禮師鳴鳳而作樂師螻蟻而設兵陣聖人能取萬物之理以致一身此人所以盜萬物也總而言之天地人物之生皆在大化之中形形相盜物物相欺無非陰陽五行之氣使之而然也惟有道者了明三盜超出陰陽之外則無三尸所盜之害也學者宜玩味焉頌曰天地人同萬物生一家一竅各含靈形形相盜陰陽化悟者超凡入太淸三盜旣宜三才旣安通玄先生曰三盜玄合於人心三才順動於天理混然子曰此承上云三盜之義於此故云三盜旣宜者此所謂有道之人一性覺照萬理貫通自能勘破一身四大是陰陽五行之氣假合而生我則不被形縳但密行符火以鍊形神神凝氣結是謂金丹大藥自能殺滅三尸之蟲旣得三盜絶滅自然三才安矣劭子所謂旣知萬物備於我肯把三才別立根張紫陽故曰追二氣於黃道會三性於元宮神全不思睡氣全不思食精全不思慾功夫至此何患乎三才不安矣頌曰三盜三才備一身心君轉物各歸根乾坤定位邪魔伏萬國淸平荷聖恩故曰食其時百骸理動其機萬化安通玄先生曰有若時然後食終身無不愈時然後動庶績無不安食不得其時動不得其機殆至滅亡混然子曰此又承上云三才旣安之義於此故曰食其時百骸理者此言學人平日大要調和五臟飲食不可失其時苟無失其時則通身三百六十骨節氣血周流無處不暢而病患自不生旣得其身體康泰可以棲神抱氣常住中田依時取華池玉液之漿澆灌靈根其苗自秀老子故曰天下有道卻走馬以糞我獨異於人而貴食母是也動其機萬化安者此言遇一陽初動之時便當轉斗柄之機以復之行道一次則通身萬神暢快純陽眞人金丹詩曰獨處乾坤大象中從頭厯厯運元功縱橫北斗心機大顚倒南辰膽氣雄鬼哭神哀金鼎裂雞飛犬化玉爐空云何俗子尋常覓大道希夷妙莫窮丹經曰仔細思量是妙哉朝朝自勸紫霞杯若將地魄精擒縛自有天魂祝夀來此之謂也頌曰修眞飲食要調停一氣沖和五臟淸金液鍊形神火煅通身毫孔放光明人知其神之神不知不神之所以神通玄先生曰傳曰時人不知盜之爲盜只謂神之能神鬼谷子曰彼此不覺之謂神蓋用微之功著矣混然子曰神之爲言靈也性也人之靈性虛明無象在父母未生已前不有其始居父母已生之後不有其終至靈至聖至幽至微包含眾體總廓萬靈不生不滅不方不圓白紫淸眞人故曰此神不是思慮神乃與元始相比肩是也此一節言學人平日修養功夫先以明性爲主心地之中常宜淸靜不可容一毫私欲𦊱礙於心亦不可著相求玄若纔舉箇意思神便不是神了經曰夫人神好淸而心擾之此神全體之妙在乎心空無物淵默含眞與太虛同其體與日月同其明凡應事接物之間以性隨機轉應自然三界圓通此所以不知不神之所以神也張眞人曰視之不可見其形及至呼時又卻譍金剛經云世人以色相求我以音聲求我是人行邪道不得見如來斯言盡矣頌曰一點元靈是至神神知神處便非眞人能了悟神虛體朗朗眞空不掛雲日月有數小大有定聖功生焉神明出焉通玄先生曰傳曰日月有准運數也大小有定君臣也觀天之時察人之事執人之機如是則聖得以功神得以明心宜理合安之善也混然子曰此承上云明性之體於此故發明修命之用旣得性住必復命關若能性命雙修方得形神俱妙夫修命之訣學人可以觀天之道日月運行而有冬夏二至陰陽停半而有卯酉二分積日成月積月成𡻕是以日月有數而小大有定豈不聞日屬陽月屬陰月本無光借日之光每月晦朔太陰與太陽同宮交會月至此時黑而無光月至初二初三離日漸遠日射光於月生明而小魂漸長魄漸消至初八日夜光平上一半乃曰上弦自此以往至十五日夜月與日相望光明圓滿而大至此魂極而魄生十六七日以下魄長魂消月光漸減至二十三日夜光平下一半乃曰下弦自此退至三十日夜月光盡而又還晦矣周而復始循環無窮此天道運化自然而然是以大修行人體此一理運周天火候於一身所言日月者精神也水火也鉛汞也性情也當作丹之時以神合氣主固於内飛神出在寅方至申時進火如日射光於月漸漸生明而壯流精化氣直入泥丸如月與日對望繼此陰生用靑女傳言退符下入坤宮日月合璧結成還丹丹始結而小功深漸養而大故謂日月有數小大有定也勤採勤收時烹刻鍊眞胎鬱秀智慧開通故曰聖功生焉神明出焉頌曰日月周天數往來功施梵氣結靈胎從微至著神超聖火裏栽蓮朵朵開其盜機也天下莫能見莫能知君子得之固躬小人得之輕命通玄先生曰傳曰其盜微而動所施甚明慱所行極玄妙君子用之達則兼濟天下太公其人也窮則獨善其一身夫子其人也豈非擇利之能審小人用之則失其身大夫種之謂歟得利而忘義李斯之謂歟豈非信道之不篤焉混然子曰此承上云運行日月於一身故得聖功生而神明出於此故云其盜機也者此箇盜字非世人竊盜之盜乃運周天符火之法一息功夫能奪天地一年造化丹經云五行不順行虎向水中生五行顚倒術龍從火裏出行此道者天地不能拘甲子管不得是以大修行人乃天地外一賊爾張紫陽所謂功夫容易藥非遙豈非其盜機也哉這箇盜機至簡至易是謂無狀之狀無象之象是以天下莫能見莫能知也君子之人得之謙恭退隱抱朴存眞絶聰棄智惟德爲身損之又損混俗同塵來者卽應無喜無嗔未嘗顯已之有道此所以得之固躬也老子曰我有三寶保而持之一曰慈二曰儉三曰不敢爲天下先又曰上德不德是以有德是也小人之人若得此道便要逞弄不能伏藏自是自大自顯自長自伐自矜欺人侮法全無忌憚薄德薄行人皆忌之如是之人未有不䧟於害而輕於命如龐涓之流是也經曰自見者不明自是者不彰自伐者無功自矜者不長强梁者不得其死孔子故曰小人反中庸小人無忌憚也豈虛言哉學人宜於此詳察頌曰燒山符子盜天機大象希形道隱微君子得之身退守小人一得便胡爲瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍通玄先生曰傳曰瞽者善於聽忘色審聲所以致其聽聾者善於視遺耳專目所以致其明故能十眾之功一晝之中三而行之所以至也一夜之中三而息之所以精也故能用萬眾之人混然子曰瞽者無目之稱聾者不聽之謂以世法言人雖兩目皆瞽耳卻善能於聽兩耳雖聾眼卻善能於視此謂世人貪心不止隨竅所漏逐於外而失於内此乃凡夫之人貪着其事故設此喻以爲學者之戒今以道用言大修行人聖智圓通神機無礙眼亦能聽耳亦能視吁夫視聽之妙非在眼耳而實在神機之視聽也絶利一源用師十倍者此言以誠性爲體絶去利欲淸心一源自得其虛靈不昧終不及行武鍊之功夫故云用師十倍之力也乃形容修性之功夫縱得寂然不動猶屬陰神豈若修命三返晝夜而有回陽換骨之妙乎其三返有二說外三返乃眼耳口内三返乃精氣神也二六時中外則回眼光凝耳韻緘口氣晝夜返顧於中不可須臾間隔内則混成三寶不可蹉過天機當鉛見癸生之時便當懸黍珠於空玄之中握固不動飛神沉下海底鍊精化氣迫逐度上南宮補離作乾繼此以往鍊氣化神直下黃庭而止巽門雙開大火煆鍊片餉之間鍊神還虛虛空朗朗復其性初此乃性命雙修之道度人經云中理五氣混合百神十轉回靈萬氣齊仙丹經云不刻時中分子午無爻卦内定乾坤是以行道一次則諸天遙唱萬神設禮修丹之力其功莫大三返晝夜得非用師萬倍者乎頌曰瞽聽聾視妙心通絶利淸源十倍功大藥三般返晝夜神施萬化道無窮心生於物死於物機在目通玄先生曰傳曰夫心有愛惡之情物有否臧之用目視而察之於外心應而度之於内善則從而行之否則違而止之所以觀善而懲惡也或以項羽其目機心生於物以符堅見機心死於物殊不知有否臧之用混然子曰以世法言眾人之心被形所役終日業識紛紜一心未嘗離物心生於物卽死於物矣其機在於兩目凡物現前目必先見見愛動心意識外逐日積月增作下死根莫非皆從眼界之漏也老子曰人之生動之死地民之輕死以其求生之厚心難制伏者因機在目也以道用言大修行人端心淸靜惟道爲身凡遇心生於物之時舉六通力放大金光照無極世界運北斗南辰以復之是得物死而我道興隆其機實在於天目流意提吸回旋之妙也此須口傳未敢顯露川老註金剛經云金剛脚踏地旛竿頭指天要知端的處北斗面南看是也頌曰心生於物死於物機應分明在目中十轉回靈歸竅妙神凝氣住道興隆天之無恩而大恩生迅雷烈風莫不蠢然通玄先生曰傳曰天以凶象咎徵見人能儆戒以修德以迅雷烈風動人之恐懼以致福無恩而生大恩之謂也混然子曰天之無恩而大恩生者此言天以生物爲心四時運化是自然之理豈有意施恩哉蓋因萬物之生妖正並作妖反害於正是不得巳大恩生焉故用雷霆以申其令揚烈風而播其威使萬物畏伏皈正其有妖物不改過者雷霆滅其形風刀碎其體去一害而安眾天威昭鑒豈容其私此天無恩而大恩所以生大恩生而迅雷烈風莫不蠢然神妙鼓舞而作頃刻徧滿虛空變化不可測也聖人亦體天道而行以安天下之民民湻樂化無恩可施其或有悖逆爲民害者不得巳建侯行師陳甲兵以伐之去一暴而安善良亦如迅雷烈風振其威嚴示之强梗順於正命此聖人無恩而大恩所以生焉此皆以世法釋若以道用言修丹之功亦同此理當其心空性靜之時形忘物忘亦無恩可施因其有陰陽二氣動靜不常而有分合之兆時遇陰魔侵犯我則正位中原飛神攝氣召陽雷電母擲火奮迅回烈風掃蕩中山之陰一息冥情莫不蠢然暢然而若醉此大恩生而施造化之功結成還丹之妙也如此頌曰天本無恩恩大生冲虛二氣怒流行雷轟風烈蠢然作造化由來不順情至樂性餘至靜性廉天之至私用之至公禽之制在氣通玄先生曰傳曰未發謂之中守中謂之常則樂得其志而性有餘矣安常謂之自足則靜其志而廉常足矣又曰自然之理微而不可知私之至也自然之效明而不可違公之至也以聖體之亦然又曰禽物之以氣制之以機豈大小之才乎太公曰豈以小大而相制哉混然子曰至樂者神全也至靜者精全也此所謂神全不生忿性樂有餘裕矣精全不思慾性靜有廉潔矣老君授于吉太平之要曰夫人天付之神地付之精中和付之氣人能寶精去欲固氣愛神内則身得長生外則國致太平况有諸内必形於外了性則身淸靜了命則丹圓成性命雙全自然至樂性餘至靜性廉也天之至私用之至公者此言天與萬物惟天得其造化之大以其不自生是以能長且久故能成其私此天所以得之至私也及其發用大運流行無物不被其澤此天所以用之至公也聖人體天道而修眞比之眾人而亦得之至私及其用於事也無一夫不被其德豈不至公乎禽之制在氣者此設喻之辭禽卽心也神也火也南方朱雀也此警示學人大要專心制氣以氣爲藥物以神爲符火採取依時烹錬合法自然陰氣化爲陽氣識神化爲眞人混融一片骨換身輕如禽鳥翱翔太空皆得制氣之理故仙人號曰羽客施肩吾曰氣是添年藥心爲使氣神能知行氣主便是得仙人此之謂也頌曰氣固神和樂有餘虛心淸儉養眞軀丹成自與天長久身若禽飛上太虛生者死之根死者生之根恩生於害害生於恩通玄先生曰生者人之所愛厚於身太過則道喪而死自來矣死者人之所惡審於事至明則道在而生自固矣福理所及謂之恩禍亂所及謂之害損已則爲物之所益害之生恩也混然子曰生死恩害此四者陰陽反復彼此對待之理有生卽死有死卽生有恩卽害有害卽恩此氣數之然也以眾人言貪生之厚心被物迷卽造下死之根矣若能死心守分絶利淸源卽得生之根矣古人所謂貪他的著他的失便宜得便宜是以聖人於此覺照分明凡心生於物心卽死之心旣能死道卽生之尹喜眞人故曰聞道於朝死心於夕金剛經云不應住色生心不應住聲香味觸法生心應無所住而生其心老子曰生之徒十有三死之徒十有三夫何故我得彼失乃得生彼得我失乃入死學者可不愼歟恩生於害害生於恩者此言恩中有害害中有恩正道德經所謂禍兮福所倚福兮禍所伏文始經亦曰天下之理恩或化爲讎讎或化爲恩此理屬於事而言不聞譚景升化書云乎侯者人所貴金者人所重眾人封公而得侯者不美眾人分玉而得金者不樂是賞不可妄行恩不可妄施由爲爭奪之漸卽爲死亡之基此皆世法釋若以道用言道由魔顯魔因道化當性天雲起之時我則登引羣眞轉輪而復禮豈不是恩生於害乎苦海波翻之際我則升玄御眾同化而歸尊豈不是害生於恩乎頌曰心生有欲死之根心死無爲道自存恩若妄施招禍害害窮仍復見於恩愚人以天地文理聖我以時物文理哲通玄先生曰傳曰觀天之運四時察地之化萬物無所不知而蔽之以無知小恩於人以蒙自養之謂也混然子曰愚人以天地文理聖者此言愚人非是言愚蠢之愚蓋爲有等學人因聰明所障被文理所拘竟不肯低下參訪至人窮究自身天地造化之理只於外面尋紙上之文億度天地文理快說快道他遂以此爲聖吁何其愚之甚也以有道者觀之反爲愚人也我以時物文理哲者此謂有道之人能大觀天地以四時之文萬物之理總歸我身明徹爲誓如羲皇仰觀俯察旁觀鳥獸之文近取諸身遠取諸物始畫八卦造書契又如黃帝之廣參孔聖之多學豈非由哲而至聖乎近有註本多於此止余按禇遂良得太極丹眞人所註本及與張果老人註本其下皆有二十一句百一十六字極說得妙今當以太極丹眞人張果本爲正諸本逸去皆後人傳注之誤爾卽非結經之義頌曰愚人外面論虛空執理拘文性不通豈識我家眞妙用朝朝日出嶺頭紅人以愚虞聖我以不愚虞聖人以奇期聖我以不奇期聖故曰沉水入火自取滅亡通玄先生曰知四時之行知萬物之生皆自然也故聖人於我以中自居之謂也故曰死生在我而已矣人之死亡譬如沉水自溺投火自焚自取滅亡理國以道在於損其事而已理軍以權在於亡其兵而已無死機則不死鬼神其如我何無生機則不生天地其如我何聖人修身以安其家理國以平天下在乎立生機以自去其死性者生之機也除死機以自取其生情者死之機也混然子曰人以愚虞聖者此謂有等參禪學道之人起頭不遇眞師所授他平日只以頑空爲性諸經不去參究惟守一塊肉心灰心槁木死捉箇念頭不放出去不貪不求他以此爲聖殊不知癡猫守於空宂而終不得於鼠也又如鑽冰求火而終不得於火也我以不愚虞聖者此言大修行人必須參拜明師開發竅妙廣通諸經究竟玄奥云何是性云何是命性如何修命如何鍊參去參來直至到那參不得處方是不愚到此之時只用一箇損字來受用諸緣損盡以至無爲自然智慧生明道沖靈應故我以不愚虞聖也豈不聞大舜之聖每好問而好察邇言大禹聞一善言則拜顏子得一善則拳拳服膺而弗失以三聖之道莫非好學而得以今人之資不學可乎度人經云乃當洞明至言是也人以奇期聖者此言有等學人不求正法惟務異端旁門小法奇怪之術以惑後人如巫炎等尙泥水丹法擇美女爲爐鼎以三峯爲採戰金鎗不倒爲固濟提吸女精作黃河逆流爲丹頭以多入少出爲行火如此謬術大亂正宗又有等以手爲雌雄劍取女癸爲丹頭又有等休妻絶粒漱津運氣摩擦搐縮吸日月精華燒茅弄火如斯等類何啻千門他以此奇而期聖也丹經故曰道法三千六百門人人各執一爲根豈知些子玄微處不在三千六百門金剛經亦曰一切有爲法如夢幻泡影如露亦如電應作如是觀是也我以不奇期聖者此言得道之士常以無事取天下内則存眞養素外則隨事應機國土淸平無爲而樂魔兵忽生攝情一息自然而然無理至理此所以不奇而期聖也故曰沉水入火自取滅亡者此當有二說以弄奇術者言自迷正宗喪失眞道耗其靈根如是之人將身蹈其湯火自取滅亡也若以有道者言當作丹之時則行戊已之門以戊土下沉於水府捉坎陽去補離陰成乾之後以已土退符流珠復還神室火鍊混融塵垢盡淨覺身心如一太虛洞妙無際此所以沉水入火自取滅亡尹眞人述說經臺詩云心昧玄言沉地府性通妙語合天心是也頌曰愚人只會弄頑空用術爲奇性自䝉我以無爲淸靜道黃金鍊出滿爐紅自然之道靜故天地萬物生天地之道浸故陰陽勝陰陽相推而變化順矣通玄先生曰傳曰自然之道無爲而無不爲動靜皆得其性靜之至也靜故能立天地生萬物自然而然也伊尹曰靜之至不知所以生也傳曰浸微也天地之道體著而用微變通莫不歸於至微之漸故能分陰陽成四時之至順也又曰聖人變化順陰陽之機天地之位自然故因自然而冥之利自然而用之莫不得自然之道也混然子曰自然之道靜者此謂天道流行四時宣氣本自然而靜所以天地萬物生聖人體天道而行亦自然而靜以無事定天下所以四海萬民樂無名之朴老子故云行不言之教我無爲而民自化我好靜而民自正是也天地之道浸故陰陽勝者此言天氣不下降地氣不上升上下不通故天地否遂成孤陰寡陽二氣偏陷五星失度日月相刑四時不調寒暑失節冬天震雷夏月飛雪赤旱洪漂萬物耗竭此天地之道浸故陰陽勝也彭眞人曰陽火過度水旱不調凝冬變爲大暑也陰符失節寒暖相侵盛夏反爲濃霜也金宮旣砂汞之不萌一鼎則蟲螟之互起大則山崩地圯金虎與木龍沸騰小則雨暴風飄坎男共離女奔逸此之謂也陰陽相推而變化順者此言陰陽有離合之妙水火有旣濟之方採藥依時運符合刻自然陰陽相推而變化順是得形神俱妙與道合眞也頌曰自然道靜物生全陰錯陽差便屬偏會得陰陽顚倒用回童返老夀齊天是故聖人知自然之道不可違因而制之至靜之道律厯所不能契爰有奇器是生萬象八卦甲子神機鬼藏陰陽相勝之術昭昭乎進乎象矣通玄先生曰傳曰道之至靜也律厯因而制之不能叶其中鳥獸居之位也又曰八卦變異之伎從是而生上則萬象下則萬機用八卦而體天用九疇而法地參之以氣候貫之以甲子達之以神機閉之以鬼藏奇譎之蕩自然也又曰陰陽相勝之術坦微而不違乎本明之信可明故能進乎精曜象矣混然子曰是故者乃轉語之辭於此故總結陰符經三篇内旨之意聖人者有道德之尊稱也知自然之道不可違者此言我旣知大道是自然之理則當守我自然之道不可違而豈别求於他也因而制之者此謂我身之神氣如龍虎之難調習必須因時運轉逆回土釜而制伏之學人能領悟此意可以鍊還丹矣至靜之道律厯所不能契者此言功夫鍊化之後自然眞空朗徹如萬里無雲之狀當此時形忘物忘性靜杳無名象難描難寫豈律厯所能契耶爰有奇器者此謂三寶混合養成靈丹貫石透金變化自在是爲無名之器豈非奇器者乎大修行人有此奇器運用大化如指掌是生萬象八卦甲子矣神機鬼藏陰陽相勝之術昭昭乎進乎象者此言神機剛烈鬼自伏藏陰盡陽純脫胎神化自此移神上居泥丸之宮正要脚踏實地仔細保養迸破天門陽神欲出勿可輕縱直待存惜如孩童力健能走然後可以出神故曰陰陽有相勝之術内功已就外行圓成自然感帝君飛詔來徵則身乘雲軿鶴駕霞光繚繞天香馥郁上升玉京金闕隨其功行而與仙官豈不是昭昭乎進乎象矣如軒轅黃帝於巴山與後宮及羣臣七十二人乘龍而飛升又如舜帝於蒼梧何侯之家五老捧詔而飛升又如漢之天師張道陵晉之許旌陽葛仙翁皆同妻子白日飛升爲金闕之臣神仙之學誠有騐也古今得道者奚止萬千之數焉學者不可以神仙爲荒唐而生退心大要信得及更求明師口授勤行修鍊無貳爾心自有天仙保舉必登仙翁之品不虛言也頌曰胎仙養就脫陰符朝拜高尊入玉虛進象昭昭神變化鸞翔鳳翥駕雲車
