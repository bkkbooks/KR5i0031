front:
  text: 黃帝陰符經黃帝陰符經注解序陰符自黃帝有之蓋聖人體天用道之機也經曰得機者萬變而愈盛以至於王失機者萬變而愈衰以至於亡厥後伊呂得其末分猶足以拯生靈况聖人乎其文簡其義玄凡有先聖數家注解互相隱顯後學難精雖有所主者若登天無階耳臣固愚昧嘗謂朝願聞道夕死無悔偶於道經藏中得陰符傳不知何代人製詞理玄邈如契自然臣遂編之附而入注冀將來之君子不失道旨矣臣張果謹序黃帝陰符經注解序天法人人法天陰符之所以作也昔黃帝慕道懇切故往崆峒山拜廣成子而問至道授以返還長生之訣後於峨嵋山又拜天眞皇人授以五芽三一之文祕而修之而登上仙憂道後世恐失其眞遂述陰符經三篇分爲上中下以按三才而明精氣神各有極趣之妙又恐人不知返還之理故首言以觀天之道執天之行盡矣此所以爲陰符經三篇之綱目知天道必知人道知人道必知丹道知丹道必知其陰陽動靜之機知其機必知其内外返還之理知其理採汞鉛不失其時運符火不失其候經中所謂絶利一源用師十倍三返晝夜用師萬倍此又示人以修眞之要在乎收拾身心一定不移之志次則用抽添功夫而不可間斷全眞之道別無他也一要精全二要氣全三要神全收視則神眞返聽則精眞緘言則氣眞了此三全三眞自然混融於中眞火煅鍊結成金胎十月初足陰盡陽純當此時脫胎神化變現無方超出生死之外永爲金剛不壞之身此所以爲還丹者也余謂是經文簡而意奥或有不明其說者着於旁求而外其道於是乎不愧僭狂之罪將先師所授祕訣遂逐段釋其文意而又述頌總證剖露玄機以俟後之同志非敢爲是可以爲初學者一助云爾南昌修江混然子王道淵序重刊道藏輯要黃帝陰符經
